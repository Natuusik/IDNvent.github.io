<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сканирование batch-кода</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 15px; font-size: 18px; margin: 10px 0; width: 100%; }
    #result { font-size: 24px; margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<h2>Сравнение двух batch-кодов</h2>

<button onclick="scanTube()">📸 Сканировать код с тюбика</button>
<p>Код с тюбика: <span id="tube">—</span></p>

<button onclick="scanPaper()">📸 Сканировать код с бумаги</button>
<p>Код с бумаги: <span id="paper">—</span></p>

<h3>Результат: <span id="result">—</span></h3>

<script>
async function takePhoto() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    const track = stream.getVideoTracks()[0];
    const imageCapture = new ImageCapture(track);
    const bitmap = await imageCapture.grabFrame();
    track.stop();
    return bitmap;
}

async function recognize(bitmap) {
    const canvas = document.createElement("canvas");
    canvas.width = bitmap.width;
    canvas.height = bitmap.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(bitmap, 0, 0);

    const { data: { text } } = await Tesseract.recognize(canvas, "eng", {
        tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
    });

    return text.replace(/\s+/g, "").trim();
}

async function scanTube() {
    document.getElementById("tube").textContent = "распознаю...";
    const bitmap = await takePhoto();
    const code = await recognize(bitmap);
    document.getElementById("tube").textContent = code || "не найдено";
    compare();
}

async function scanPaper() {
    document.getElementById("paper").textContent = "распознаю...";
    const bitmap = await takePhoto();
    const code = await recognize(bitmap);
    document.getElementById("paper").textContent = code || "не найдено";
    compare();
}

function compare() {
    const tube = document.getElementById("tube").textContent;
    const paper = document.getElementById("paper").textContent;

    if (tube === "—" || paper === "—" || tube === "распознаю..." || paper === "распознаю...") return;

    if (tube === paper && tube !== "не найдено") {
        result.textContent = "✔ ОК — коды совпадают";
        result.style.color = "green";
    } else {
        result.textContent = "✘ НЕ ОК — коды разные";
        result.style.color = "red";
    }
}
</script>

</body>
</html>
