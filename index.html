<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сканирование batch-кода</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 15px; font-size: 18px; margin: 10px 0; width: 100%; }
    #result { font-size: 24px; margin-top: 20px; font-weight: bold; }

    video {
        width: 100%;
        border: 2px solid #444;
        margin-top: 10px;
        position: relative;
    }

    /* Узкая горизонтальная рамка */
    #frame {
        position: absolute;
        top: 45%;
        left: 10%;
        width: 80%;
        height: 12%;
        border: 3px solid red;
        box-sizing: border-box;
        pointer-events: none;
    }

    .video-container {
        position: relative;
        width: 100%;
    }
</style>
</head>
<body>

<h2>Сравнение двух batch-кодов</h2>

<div class="video-container">
    <video id="preview" autoplay playsinline></video>
    <div id="frame"></div>
</div>

<button onclick="captureTube()">📸 Сфотографировать код с тюбика</button>
<p>Код с тюбика: <span id="tube">—</span></p>

<button onclick="capturePaper()">📸 Сфотографировать код с бумаги</button>
<p>Код с бумаги: <span id="paper">—</span></p>

<h3>Результат: <span id="result">—</span></h3>

<script>
let stream;

// Запуск камеры
async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });
    document.getElementById("preview").srcObject = stream;
}

startCamera();

// Фото только области рамки
async function takeCroppedPhoto() {
    const video = document.getElementById("preview");

    const frame = document.getElementById("frame");
    const rect = frame.getBoundingClientRect();
    const videoRect = video.getBoundingClientRect();

    const scaleX = video.videoWidth / videoRect.width;
    const scaleY = video.videoHeight / videoRect.height;

    const cropX = (rect.left - videoRect.left) * scaleX;
    const cropY = (rect.top - videoRect.top) * scaleY;
    const cropW = rect.width * scaleX;
    const cropH = rect.height * scaleY;

    const canvas = document.createElement("canvas");
    canvas.width = cropW;
    canvas.height = cropH;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    return canvas;
}

// OCR
async function recognize(canvas) {
    const { data: { text } } = await Tesseract.recognize(canvas, "eng", {
        tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
    });

    return text.replace(/\s+/g, "").trim();
}

// Сканирование тюбика
async function captureTube() {
    document.getElementById("tube").textContent = "распознаю...";
    const canvas = await takeCroppedPhoto();
    const code = await recognize(canvas);
    document.getElementById("tube").textContent = code || "не найдено";
    compare();
}

// Сканирование бумаги
async function capturePaper() {
    document.getElementById("paper").textContent = "распознаю...";
    const canvas = await takeCroppedPhoto();
    const code = await recognize(canvas);
    document.getElementById("paper").textContent = code || "не найдено";
    compare();
}

// Сравнение
function compare() {
    const tube = document.getElementById("tube").textContent;
    const paper = document.getElementById("paper").textContent;

    if (tube === "—" || paper === "—" || tube === "распознаю..." || paper === "распознаю...") return;

    if (tube === paper && tube !== "не найдено") {
        result.textContent = "✔ ОК — коды совпадают";
        result.style.color = "green";
    } else {
        result.textContent = "✘ НЕ ОК — коды разные";
        result.style.color = "red";
    }
}
</script>

</body>
</html>
