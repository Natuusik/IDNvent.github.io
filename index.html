<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Универсальный сканер кодов</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 15px; font-size: 18px; margin: 10px 0; width: 100%; }
    #result { font-size: 24px; margin-top: 20px; font-weight: bold; }

    .video-container { position: relative; width: 100%; }
    video { width: 100%; border: 2px solid #444; }

    /* Узкая горизонтальная рамка */
    #frame {
        position: absolute;
        top: 45%;
        left: 10%;
        width: 80%;
        height: 24%;
        border: 3px solid red;
        pointer-events: none;
        box-sizing: border-box;
    }
</style>
</head>
<body>

<h2>Универсальный сканер кодов</h2>

<div class="video-container">
    <video id="preview" autoplay playsinline></video>
    <div id="frame"></div>
</div>

<button onclick="scanTube()">📸 Сканировать код с тюбика</button>
<p>Код с тюбика: <span id="tube">—</span></p>

<button onclick="scanPaper()">📸 Сканировать код с бумаги</button>
<p>Код с бумаги: <span id="paper">—</span></p>

<h3>Результат: <span id="result">—</span></h3>

<script>

/* ============================================================
   ===============  CAMERA MODULE (FULL HD)  ===================
   ============================================================ */

let stream;

async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({
        video: {
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            facingMode: "environment"
        }
    });
    document.getElementById("preview").srcObject = stream;
}

startCamera();

async function autoFocus() {
    const track = stream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
        try {
            await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
        } catch (e) {}
    }
}

/* ============================================================
   ==================  CROP MODULE  ============================
   ============================================================ */

async function cropFrame() {
    const video = document.getElementById("preview");
    const frame = document.getElementById("frame");

    const rect = frame.getBoundingClientRect();
    const videoRect = video.getBoundingClientRect();

    const scaleX = video.videoWidth / videoRect.width;
    const scaleY = video.videoHeight / videoRect.height;

    const cropX = (rect.left - videoRect.left) * scaleX;
    const cropY = (rect.top - videoRect.top) * scaleY;
    const cropW = rect.width * scaleX;
    const cropH = rect.height * scaleY;

    const canvas = document.createElement("canvas");
    canvas.width = cropW;
    canvas.height = cropH;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    return canvas;
}

/* ============================================================
   ===============  AUTO-ANALYSIS MODULE  ======================
   ============================================================ */

function analyzeImage(canvas) {
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = img.data;

    let brightness = 0;
    let contrast = 0;

    for (let i = 0; i < data.length; i += 4) {
        const v = (data[i] + data[i+1] + data[i+2]) / 3;
        brightness += v;
    }

    brightness /= (data.length / 4);

    // Контраст — разница между соседними пикселями
    for (let i = 0; i < data.length - 4; i += 4) {
        const v1 = (data[i] + data[i+1] + data[i+2]) / 3;
        const v2 = (data[i+4] + data[i+5] + data[i+6]) / 3;
        contrast += Math.abs(v1 - v2);
    }

    contrast /= (data.length / 4);

    return { brightness, contrast };
}

/* ============================================================
   ==================  FILTERS MODULE  =========================
   ============================================================ */

function applyReliefFilter(canvas) {
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = img.data;

    for (let i = 0; i < data.length; i += 4) {
        let v = (data[i] + data[i+1] + data[i+2]) / 3;
        v = v < 128 ? 0 : 255;
        data[i] = data[i+1] = data[i+2] = v;
    }

    ctx.putImageData(img, 0, 0);
    return canvas;
}

function applyContrastFilter(canvas) {
function applyContrastFilter(canvas) {
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = img.data;

    for (let i = 0; i < data.length; i += 4) {
        let v = (data[i] + data[i+1] + data[i+2]) / 3;

        // Усиленный контраст
        v = v < 110 ? 0 : 255;

        data[i] = data[i+1] = data[i+2] = v;
    }

    ctx.putImageData(img, 0, 0);
    return canvas;
}

function applySoftFilter(canvas) {
    const ctx = canvas.getContext("2d");
    ctx.filter = "contrast(130%) brightness(110%)";
    ctx.drawImage(canvas, 0, 0);
    return canvas;
}

/* ============================================================
   ===============  FILTER SELECTION MODULE  ===================
   ============================================================ */

function autoFilter(canvas) {
    const { brightness, contrast } = analyzeImage(canvas);

    if (contrast < 15) return applyReliefFilter(canvas);   // выпуклый/вдавленный
    if (contrast > 40) return applyContrastFilter(canvas); // печатный
    return applySoftFilter(canvas);                        // рукописный
}

/* ============================================================
   ====================  OCR MODULE  ===========================
   ============================================================ */

async function recognize(canvas) {
    const { data: { text } } = await Tesseract.recognize(canvas, "eng", {
        tessedit_char_whitelist:
            "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@×*&%!?()[]{}+-=/#_АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЫЭЮЯабвгдеёжзийклмнопрстуфхцчшщыэюя"
    });

    return text.replace(/\s+/g, "").trim();
}

/* ============================================================
   ==================  MAIN LOGIC MODULE  ======================
   ============================================================ */

async function scanTube() {
    document.getElementById("tube").textContent = "распознаю...";
    await autoFocus();
    let canvas = await cropFrame();
    canvas = autoFilter(canvas);
    const code = await recognize(canvas);
    document.getElementById("tube").textContent = code || "не найдено";
    compare();
}

async function scanPaper() {
    document.getElementById("paper").textContent = "распознаю...";
    await autoFocus();
    let canvas = await cropFrame();
    canvas = autoFilter(canvas);
    const code = await recognize(canvas);
    document.getElementById("paper").textContent = code || "не найдено";
    compare();
}

function compare() {
    const tube = document.getElementById("tube").textContent;
    const paper = document.getElementById("paper").textContent;

    if (tube === "—" || paper === "—" || tube === "распознаю..." || paper === "распознаю...") return;

    if (tube === paper && tube !== "не найдено") {
        result.textContent = "✔ ОК — коды совпадают";
        result.style.color = "green";
    } else {
        result.textContent = "✘ НЕ ОК — коды разные";
        result.style.color = "red";
    }
}

</script>

</body>
</html>
