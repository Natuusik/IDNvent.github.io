<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>–£–љ–Є–≤–µ—А—Б–∞–ї—М–љ—Л–є —Б–Ї–∞–љ–µ—А –Ї–Њ–і–Њ–≤</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 15px; font-size: 18px; margin: 10px 0; width: 100%; }
    #result { font-size: 24px; margin-top: 20px; font-weight: bold; }

    .video-container { position: relative; width: 100%; }
    video { width: 100%; border: 2px solid #444; }

    /* –£–Ј–Ї–∞—П –≥–Њ—А–Є–Ј–Њ–љ—В–∞–ї—М–љ–∞—П —А–∞–Љ–Ї–∞ */
    #frame {
        position: absolute;
        top: 45%;
        left: 10%;
        width: 80%;
        height: 24%;
        border: 3px solid red;
        pointer-events: none;
        box-sizing: border-box;
    }
</style>
</head>
<body>

<h2>–£–љ–Є–≤–µ—А—Б–∞–ї—М–љ—Л–є —Б–Ї–∞–љ–µ—А –Ї–Њ–і–Њ–≤</h2>

<div class="video-container">
    <video id="preview" autoplay playsinline></video>
    <div id="frame"></div>
</div>

<button onclick="scanTube()">рЯУЄ –°–Ї–∞–љ–Є—А–Њ–≤–∞—В—М –Ї–Њ–і —Б —В—О–±–Є–Ї–∞</button>
<p>–Ъ–Њ–і —Б —В—О–±–Є–Ї–∞: <span id="tube">вАФ</span></p>

<button onclick="scanPaper()">рЯУЄ –°–Ї–∞–љ–Є—А–Њ–≤–∞—В—М –Ї–Њ–і —Б –±—Г–Љ–∞–≥–Є</button>
<p>–Ъ–Њ–і —Б –±—Г–Љ–∞–≥–Є: <span id="paper">вАФ</span></p>

<h3>–†–µ–Ј—Г–ї—М—В–∞—В: <span id="result">вАФ</span></h3>

<script>

/* ============================================================
   ===============  CAMERA MODULE (FULL HD)  ===================
   ============================================================ */

let stream;

async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({
        video: {
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            facingMode: "environment"
        }
    });
    document.getElementById("preview").srcObject = stream;
}

startCamera();

async function autoFocus() {
    const track = stream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
        try {
            await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
        } catch (e) {}
    }
}

/* ============================================================
   ==================  CROP MODULE  ============================
   ============================================================ */

async function cropFrame() {
    const video = document.getElementById("preview");
    const frame = document.getElementById("frame");

    const rect = frame.getBoundingClientRect();
    const videoRect = video.getBoundingClientRect();

    const scaleX = video.videoWidth / videoRect.width;
    const scaleY = video.videoHeight / videoRect.height;

    const cropX = (rect.left - videoRect.left) * scaleX;
    const cropY = (rect.top - videoRect.top) * scaleY;
    const cropW = rect.width * scaleX;
    const cropH = rect.height * scaleY;

    const canvas = document.createElement("canvas");
    canvas.width = cropW;
    canvas.height = cropH;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    return canvas;
}

/* ============================================================
   ===============  AUTO-ANALYSIS MODULE  ======================
   ============================================================ */

function analyzeImage(canvas) {
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = img.data;

    let brightness = 0;
    let contrast = 0;

    for (let i = 0; i < data.length; i += 4) {
        const v = (data[i] + data[i+1] + data[i+2]) / 3;
        brightness += v;
    }

    brightness /= (data.length / 4);

    // –Ъ–Њ–љ—В—А–∞—Б—В вАФ —А–∞–Ј–љ–Є—Ж–∞ –Љ–µ–ґ–і—Г —Б–Њ—Б–µ–і–љ–Є–Љ–Є –њ–Є–Ї—Б–µ–ї—П–Љ–Є
    for (let i = 0; i < data.length - 4; i += 4) {
        const v1 = (data[i] + data[i+1] + data[i+2]) / 3;
        const v2 = (data[i+4] + data[i+5] + data[i+6]) / 3;
        contrast += Math.abs(v1 - v2);
    }

    contrast /= (data.length / 4);

    return { brightness, contrast };
}

/* ============================================================
   ==================  FILTERS MODULE  =========================
   ============================================================ */

function applyReliefFilter(canvas) {
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = img.data;

    for (let i = 0; i < data.length; i += 4) {
        let v = (data[i] + data[i+1] + data[i+2]) / 3;
        v = v < 128 ? 0 : 255;
        data[i] = data[i+1] = data[i+2] = v;
    }

    ctx.putImageData(img, 0, 0);
    return canvas;
}

function applyContrastFilter(canvas) {
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = img.data;

    for (let i = 0; i < data.length; i += 4) {
        let v = (data[i] + data[i+1] + data[i+2]) / 3;
        v = v > 140 ? 255 : 0;
        data[i] = data[i+1] = data[i+2] = v;
    }

    ctx.putImageData(img, 0, 0);
    return canvas;
}

function applySoftFilter(canvas) {
    const ctx = canvas.getContext("2d");
    ctx.filter = "contrast(130%) brightness(110%)";
    ctx.drawImage(canvas, 0, 0);
    return canvas;
}

/* ============================================================
   ===============  FILTER SELECTION MODULE  ===================
   ============================================================ */

function autoFilter(canvas) {
    const { brightness, contrast } = analyzeImage(canvas);

    if (contrast < 15) return applyReliefFilter(canvas);   // –≤—Л–њ—Г–Ї–ї—Л–є/–≤–і–∞–≤–ї–µ–љ–љ—Л–є
    if (contrast > 40) return applyContrastFilter(canvas); // –њ–µ—З–∞—В–љ—Л–є
    return applySoftFilter(canvas);                        // —А—Г–Ї–Њ–њ–Є—Б–љ—Л–є
}

/* ============================================================
   ====================  OCR MODULE  ===========================
   ============================================================ */

async function recognize(canvas) {
    const { data: { text } } = await Tesseract.recognize(canvas, "eng", {
        tessedit_char_whitelist:
            "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@√Ч*&%!?()[]{}+-=/#_–Р–С–Т–У–Ф–Х–Б–Ц–Ч–Ш–Щ–Ъ–Ы–Ь–Э–Ю–Я–†–°–Ґ–£–§–•–¶–І–®–©–Ђ–≠–Ѓ–ѓ–∞–±–≤–≥–і–µ—С–ґ–Ј–Є–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—Л—Н—О—П"
    });

    return text.replace(/\s+/g, "").trim();
}

/* ============================================================
   ==================  MAIN LOGIC MODULE  ======================
   ============================================================ */

async function scanTube() {
    document.getElementById("tube").textContent = "—А–∞—Б–њ–Њ–Ј–љ–∞—О...";
    await autoFocus();
    let canvas = await cropFrame();
    canvas = autoFilter(canvas);
    const code = await recognize(canvas);
    document.getElementById("tube").textContent = code || "–љ–µ –љ–∞–є–і–µ–љ–Њ";
    compare();
}

async function scanPaper() {
    document.getElementById("paper").textContent = "—А–∞—Б–њ–Њ–Ј–љ–∞—О...";
    await autoFocus();
    let canvas = await cropFrame();
    canvas = autoFilter(canvas);
    const code = await recognize(canvas);
    document.getElementById("paper").textContent = code || "–љ–µ –љ–∞–є–і–µ–љ–Њ";
    compare();
}

function compare() {
    const tube = document.getElementById("tube").textContent;
    const paper = document.getElementById("paper").textContent;

    if (tube === "вАФ" || paper === "вАФ" || tube === "—А–∞—Б–њ–Њ–Ј–љ–∞—О..." || paper === "—А–∞—Б–њ–Њ–Ј–љ–∞—О...") return;

    if (tube === paper && tube !== "–љ–µ –љ–∞–є–і–µ–љ–Њ") {
        result.textContent = "вЬФ –Ю–Ъ вАФ –Ї–Њ–і—Л —Б–Њ–≤–њ–∞–і–∞—О—В";
        result.style.color = "green";
    } else {
        result.textContent = "вЬШ –Э–Х –Ю–Ъ вАФ –Ї–Њ–і—Л —А–∞–Ј–љ—Л–µ";
        result.style.color = "red";
    }
}

</script>

</body>
</html>
